<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <style>
        body {
            margin: 0;
        }

        #parent {
            height: 100vh;
            border: 10px solid black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-image: linear-gradient(to right, #f1502f, #0d1117);
        }

       
        #child1,
        #child2,
        #child3 {
            height: 400px;
            width: 400px;
            border-radius: 50%;
            overflow: hidden;   
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white; 
        }

        #child1 img,
        #child2 img,
        #child3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div id="parent">

        <div id="child1">
            <img src="https://cdn-icons-png.flaticon.com/512/4494/4494748.png"
                alt="Git Logo">
        </div>

        <div id="child2">
            <img src="https://img.freepik.com/premium-vector/vs-versus-icon-logo-black-white-symbol-fight-competition-battle-sport-game-grunge-drawing-paint_101884-2201.jpg?w=2000"
                alt="VS">
        </div>

        <div id="child3">
            <img src="https://pngimg.com/uploads/github/github_PNG80.png"
                alt="GitHub Logo">
        </div>

    </div>

</body>

</html>
