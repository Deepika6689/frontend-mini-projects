<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #22528A, #26788C);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        fieldset {
            border: none;
            padding: 0;
        }

        legend {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2a9d8f;
            outline: none;
            box-shadow: 0 0 8px rgba(42, 157, 143, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1f3c88;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2a9d8f;
        }
        #heading {
            font-size: 28px;
            color: #1f3c88;
        }
    </style>
</head>

<body>

    <form>
        <fieldset>
            <legend id="heading"><b>LOGIN</b></legend>

            <label for="Email">Email:</label>
            <input type="email" id="Email" placeholder="Enter your email">

            <label for="Password">Password:</label>
            <input type="password" id="Password" placeholder="Enter your password">

            <button type="submit">LOGIN</button><br><br>
            Don't have an account? <a href="signup.html">Sign Up</a>
        </fieldset>
    </form>

</body>
</html>
