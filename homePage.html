<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Landing Page</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}


nav{
    height: 70px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    position: fixed;
    width: 100%;
    top: 0;
}

.left{
    display: flex;
    align-items: center;
    gap: 40px;
}

.brand{
    font-size: 22px;
    font-weight: bold;
    color: white;
}

.menu{
    display: flex;
    gap: 25px;
}

.menu a{
    color: white;
    text-decoration: none;
    position: relative;
    transition: 0.3s;
}


.menu a::after{
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #00e5ff;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.menu a:hover::after{
    width: 100%;
}

.search{
    display: flex;
    gap: 10px;
}

.search input{
    padding: 6px 10px;
    border-radius: 5px;
    border: none;
}

.search button{
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    background-color: #00e5ff;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

.search button:hover{
    background-color: white;
}


.hero{
    height: 100vh;
    background: linear-gradient(to right, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding-top: 70px;
}

.hero h1{
    font-size: 48px;
    margin-bottom: 15px;
}

.hero p{
    font-size: 18px;
    opacity: 0.8;
}


@media (max-width: 768px){

    nav{
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 15px;
    }

    .left{
        flex-direction: column;
        gap: 15px;
    }

    .menu{
        flex-direction: column;
        align-items: center;
    }

    .hero h1{
        font-size: 30px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="left">
        <div class="brand">Brand</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
        <button>Search</button>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Welcome to My Website</h1>
        <p>Learning frontend development and building responsive websites one project at a time.</p>
    </div>
</section>

</body>
</html>
